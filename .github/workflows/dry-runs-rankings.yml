name: Dry Run - Print Rankings Only
on:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Print Top 100 (no Lichess update)
        run: python print_rankings.py
      - name: Commit rankings_output files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rankings_output/
          git diff --cached --quiet || git commit -m "chore: dry-run rankings export [skip ci]"
          git push
